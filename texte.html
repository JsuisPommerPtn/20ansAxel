<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📜 Le Texte Sacré</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #ffd89b 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            animation: fall linear infinite;
            top: -10px;
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 1.8rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffd700, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-bottom: 15px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .back-btn:active {
            transform: translateX(-2px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .read-btn-wrapper {
            text-align: center;
            padding: 5px 0;
        }

        .read-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.5);
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
        }

        .read-btn:active {
            transform: scale(0.97);
        }

        .read-btn-sub {
            margin-top: 10px;
            font-size: 0.75rem;
            opacity: 0.75;
            font-style: italic;
        }

        .pdf-viewer-section {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .pdf-viewer-section.visible {
            display: block;
        }

        .pdf-frame-wrapper {
            background: transparent;
            overflow: hidden;
            border-radius: 16px;
        }

        .pdf-frame-wrapper iframe {
            width: 100%;
            height: 450px;
            border: none;
            display: block;
            background: transparent;
        }

        .pdf-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .return-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        .return-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .return-home:active {
            transform: translateY(-2px);
        }

        .bg-mute-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 1.2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            opacity: 0.7;
            font-size: 0.75rem;
        }

        @media (min-width: 768px) {
            .container { padding: 40px 20px; }
            header h1 { font-size: 2.8rem; }
            header p { font-size: 1.1rem; }
            .section { padding: 35px; }
            .section-title { font-size: 1.8rem; }
            .read-btn { font-size: 1.2rem; padding: 18px 40px; width: auto; }
            .pdf-frame-wrapper iframe { height: 800px; }
            .download-btn { font-size: 1.05rem; padding: 14px 28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn" id="backLink">← Retour</a>

        <header>
            <h1>📜 Le Texte Sacré</h1>
            <p>Un texte qui t'a marqué</p>
        </header>

        <section class="section">
            <h2 class="section-title">📄 Le Texte Sacré</h2>
            <div class="read-btn-wrapper">
                <button class="read-btn" id="openTextBtn">
                    📖 Lire le texte sacré
                </button>
                <p class="read-btn-sub">Peu de gens connaissent l'existence de ce texte</p>
            </div>
        </section>

        <section class="pdf-viewer-section" id="pdfSection">
            <div class="pdf-frame-wrapper">
                <iframe
                    id="pdfFrame"
                    src=""
                    title="Le Texte Sacré">
                </iframe>
            </div>
            <div class="pdf-actions">
                <a href="Texte_sacré.pdf" download="Texte_sacré.pdf" class="download-btn">
                    ⬇ Télécharger le PDF
                </a>
            </div>
            
            <div class="return-link">
                <a href="index.html" class="return-home" id="returnHomeLink">
                    🏠 Retourner à l'accueil
                </a>
            </div>
        </section>

        <footer>
            <p>Fait avec amour par Evan Raimbault</p>
        </footer>
    </div>

    <button class="bg-mute-btn" id="bgMuteBtn">🔊</button>

    <script>
        // Confettis
        const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f093fb', '#f5576c', '#96e6a1'];
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDuration = (Math.random() * 3 + 4) + 's';
            c.style.animationDelay = Math.random() * 5 + 's';
            c.style.width = (Math.random() * 8 + 6) + 'px';
            c.style.height = (Math.random() * 8 + 6) + 'px';
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            document.body.appendChild(c);
        }

        let bgMusic = null;
        let isBgMuted = false;
        
        const savedAudio = sessionStorage.getItem('sharedAudio');
        
        if (savedAudio) {
            try {
                const audioState = JSON.parse(savedAudio);
                bgMusic = new Audio('Audio/OFFROAD.mp3');
                bgMusic.loop = true;
                bgMusic.volume = 0.3;
                bgMusic.currentTime = audioState.currentTime || 0;
                bgMusic.muted = audioState.muted || false;
                isBgMuted = audioState.muted || false;
                
                if (audioState.isPlaying) {
                    bgMusic.play().catch(function() {});
                }
                
                updateMuteButton();
            } catch(e) {
                createNewBgMusic();
            }
        } else {
            createNewBgMusic();
        }
        
        function createNewBgMusic() {
            bgMusic = new Audio('Audio/OFFROAD.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.3;
            bgMusic.play().catch(function() {});
        }
        
        function updateMuteButton() {
            const btn = document.getElementById('bgMuteBtn');
            if (btn) btn.textContent = isBgMuted ? '🔇' : '🔊';
        }
        
        const bgMuteBtn = document.getElementById('bgMuteBtn');
        if (bgMuteBtn) {
            bgMuteBtn.onclick = function(e) {
                e.preventDefault();
                if (bgMusic) {
                    isBgMuted = !isBgMuted;
                    bgMusic.muted = isBgMuted;
                    bgMuteBtn.textContent = isBgMuted ? '🔇' : '🔊';
                    saveAudioState();
                }
            };
        }
        
        function saveAudioState() {
            if (bgMusic) {
                const audioState = {
                    currentTime: bgMusic.currentTime,
                    isPlaying: !bgMusic.paused,
                    muted: bgMusic.muted
                };
                sessionStorage.setItem('sharedAudio', JSON.stringify(audioState));
            }
        }
        
        setInterval(saveAudioState, 1000);
        
        const voiceAudio = new Audio('Audio/Audio Final.m4a');
        let isVoicePlaying = false;
        
        voiceAudio.addEventListener('play', function() {
            if (!isVoicePlaying) {
                isVoicePlaying = true;
                if (bgMusic) bgMusic.pause();
                if (bgMuteBtn) bgMuteBtn.style.opacity = '0.5';
            }
        });
        
        voiceAudio.addEventListener('ended', function() {
            isVoicePlaying = false;
            if (bgMusic && !isBgMuted) {
                bgMusic.play().catch(function() {});
            }
            if (bgMuteBtn) bgMuteBtn.style.opacity = '1';
            saveAudioState();
        });
        
        voiceAudio.addEventListener('pause', function() {
            if (voiceAudio.currentTime === voiceAudio.duration || voiceAudio.ended) {
                // Fin normale
            } else if (isVoicePlaying) {
                isVoicePlaying = false;
                if (bgMusic && !isBgMuted) {
                    bgMusic.play().catch(function() {});
                }
                if (bgMuteBtn) bgMuteBtn.style.opacity = '1';
            }
        });
        
        function openText() {
            const pdfSection = document.getElementById('pdfSection');
            const pdfFrame = document.getElementById('pdfFrame');
            const btn = document.getElementById('openTextBtn');
            
            if (pdfFrame) {
                pdfFrame.src = 'Texte_sacré.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH';
            }
            if (pdfSection) {
                pdfSection.classList.add('visible');
            }
            
            if (btn) {
                btn.textContent = '✅ Texte ouvert';
                btn.style.background = 'linear-gradient(135deg, #96e6a1, #4ecdc4)';
                btn.disabled = true;
            }
            
            setTimeout(function() {
                if (pdfSection) {
                    pdfSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 200);
            
            voiceAudio.play().catch(function() {});
        }
        
        const openTextBtn = document.getElementById('openTextBtn');
        if (openTextBtn) {
            openTextBtn.onclick = openText;
        }
        
        const backLink = document.getElementById('backLink');
        const returnHomeLink = document.getElementById('returnHomeLink');
        
        function saveAndExit() {
            saveAudioState();
        }
        
        if (backLink) backLink.onclick = saveAndExit;
        if (returnHomeLink) returnHomeLink.onclick = saveAndExit;
        
        window.addEventListener('beforeunload', function() {
            saveAudioState();
        });
    </script>
</body>
</html>
